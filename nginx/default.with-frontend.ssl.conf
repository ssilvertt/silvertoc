server {
  listen 80;
  server_name silvert.software;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name silvert.software;

  client_max_body_size 10m;
  resolver 127.0.0.11 ipv6=off valid=30s;

  ssl_certificate /etc/letsencrypt/live/silvert.software/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/silvert.software/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;

  location /bridge/ {
    set $bot_upstream telegram-bot:3000;
    rewrite ^/bridge/(.*)$ /$1 break;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;

    proxy_pass http://$bot_upstream;
  }

  location = /bridge {
    return 301 /bridge/;
  }

  location / {
    set $frontend_upstream frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://$frontend_upstream;
  }
}
